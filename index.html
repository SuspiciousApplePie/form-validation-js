<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baumans&family=Cagliostro&family=Poppins:ital,wght@0,400;0,800;1,800&display=swap" rel="stylesheet">
    <script src="./js/script.js" defer></script>
    <title>Luminae Residency</title>
</head>
<body>
    <div class="container">
        <main class="main-content">
            <h1>Sign up on Luminae Residency</h1>
            <section class="sign-up-form">
                <form action="" method="post" novalidate>
                    <div class="form-control">
                        <label for="email-address">Email</label>
                        <input type="email" name="email-address" id="email-address" pattern="^.+@luminae\.lum$" required>
                        <p class="error-message"></p>
                    </div>
                    <div class="form-control">
                        <label for="cities">City</label>
                        <select name="" id="cities" required>
                            <option value="" selected>---Select a City---</option>
                            <option value="il">Illumia</option>
                            <option value="lu">Lunatown</option>
                            <option value="st">Starspire</option>
                            <option value="fl">Florenium</option>
                            <option value="um">Ume</option>
                        </select>
                        <p class="error-message"></p>
                    </div>
                    <div class="form-control">
                        <label for="postal">Postal Code</label>
                        <input type="text" name="postal" id="postal" required>
                        <p class="error-message"></p>
                    </div>
                    <div class="form-control">
                        <label for="password">Password</label>
                        <input type="password" name="password" id="password" minlength="8" required>
                        <p class="error-message"></p>
                    </div>
                    <div class="form-control">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" name="confirm-password" id="confirm-password" minlength="8" required>
                        <p class="error-message"></p>
                    </div>
                    <div class="btn-control">
                        <button type="submit" id="submit">Sign in</button>
                    </div>
                </form>
            </section>
        </main>
    </div>
    
</body>
</html>
