<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
</head>
<body>
    <div class="container">
        <main class="main-content">
            <h1>Sign up</h1>
            <section class="sign-up-form">
                <form action="" method="post" novalidate>
                    <div class="form-control">
                        <label for="email-address">Email</label>
                        <input type="email" name="email-address" id="email-address">
                    </div>
                    <div class="form-control">
                        <label for="countries">Country</label>
                        <select name="" id="countries">
                            <option value="il">Illumia</option>
                            <option value="lu">Lunatown</option>
                            <option value="st">Starspire</option>
                            <option value="fl">Florenium</option>
                            <option value="um">Ume</option>
                        </select>
                    </div>
                    <div class="form-control">
                        <label for="postal">Postal Code</label>
                        <input type="text" name="postal" id="postal">
                    </div>
                    <div class="form-control">
                        <label for="password">Password</label>
                        <input type="password" name="password" id="password" minlength="8">
                    </div>
                    <div class="form-control">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" name="confirm-password" id="confirm-password" minlength="8">
                    </div>
                    <div class="btn-control">
                        <button type="submit" id="submit">Sign in</button>
                    </div>
                </form>
            </section>
        </main>
    </div>
    
</body>
</html>
